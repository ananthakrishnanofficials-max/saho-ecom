    - intent: faq_shipping
    - action: utter_faq_shipping

- rule: Handle Refund FAQ
  steps:
    - intent: faq_refund
    - action: utter_faq_refund

- rule: Handle Payment FAQ
  steps:
    - intent: faq_payment
    - action: utter_faq_payment

- rule: Handle Contact Support
  steps:
    - intent: contact_support
    - action: utter_contact_support

- rule: Handle Bot Challenge
  steps:
    - intent: bot_challenge
    - action: utter_iamabot
