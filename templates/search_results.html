<h2>Search Results for "{{ query }}"</h2>

<div class="products">
    {% for product in results %}
        <div class="product">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p>₹{{ product.price }}</p>
        </div>
    {% empty %}
        <p>No products found.</p>
    {% endfor %}
</div>
