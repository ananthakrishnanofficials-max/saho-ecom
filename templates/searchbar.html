<div class="search-wrapper">
    {% include 'searchbar.html' %}
<div class="search-container">

  <input 
    type="text" 
    id="searchInput"
    class="search-bar"
    placeholder="Search products..."
    autocomplete="off"
  >

  <!-- Suggestions Dropdown -->
  <div id="suggestions"></div>

</div>
</div>

<style>
.search-container {
  position: relative;
  width: 400px;
}

/* INPUT */
.search-bar {
  width: 100%;
  padding: 12px 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  font-size: 15px;
}

/* DROPDOWN */
#suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  display: none;
  z-index: 999;
}

/* ITEM */
.suggestion-item {
  padding: 10px;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #f5f5f5;
}

.suggestion-item img {
  width: 40px;
  height: 40px;
  margin-right: 10px;
  object-fit: cover;
}
</style>

<script>
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

input.addEventListener("keyup", function() {
    let query = this.value;

    if (query.length < 1) {
        suggestions.style.display = "none";
        return;
    }

    fetch(`/live-search/?q=${query}`)
    .then(res => res.json())
    .then(data => {

        suggestions.innerHTML = "";

        if (data.length > 0) {
            suggestions.style.display = "block";

            data.forEach(item => {
                let div = document.createElement("div");
                div.classList.add("suggestion-item");

                div.innerHTML = `
                    <img src="${item.image}">
                    <span>${item.name}</span>
                `;

                div.onclick = () => {
                    window.location.href = `/product/${item.id}/`;
                };

                suggestions.appendChild(div);
            });

        } else {
            suggestions.style.display = "none";
        }
    });
});
</script>
